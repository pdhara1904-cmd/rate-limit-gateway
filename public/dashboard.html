<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Rate Limit Gateway — Live Monitor</title>
<style>
  :root {
    --bg: #0b0e12;
    --panel: #12161d;
    --panel-border: #1e242e;
    --text: #e7ebef;
    --muted: #7c8798;
    --amber: #f5a623;
    --amber-dim: #7a531c;
    --green: #3ecf8e;
    --red: #ff5c5c;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 32px 24px 60px;
  }
  .wrap { max-width: 1040px; margin: 0 auto; }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }
  h1 {
    font-size: 19px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0;
  }
  h1 span { color: var(--muted); font-weight: 400; }
  .status {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 12px; color: var(--muted);
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 0 0 rgba(255,92,92,0.5);
  }
  .dot.live {
    background: var(--green);
    animation: pulse 1.6s ease-out infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(62,207,142,0.55); }
    70% { box-shadow: 0 0 0 8px rgba(62,207,142,0); }
    100% { box-shadow: 0 0 0 0 rgba(62,207,142,0); }
  }

  .grid {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 20px;
  }
  .panel h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0 0 16px;
    font-weight: 600;
  }

  /* --- Bucket visual: the signature element --- */
  #bucketPanel { display: flex; flex-direction: column; align-items: center; }
  .bucket-svg { width: 140px; height: 180px; }
  .bucket-readout {
    font-family: var(--mono);
    font-size: 30px;
    font-weight: 600;
    color: var(--amber);
    margin-top: 6px;
    line-height: 1;
  }
  .bucket-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .bucket-sub {
    margin-top: 18px;
    width: 100%;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    border-top: 1px solid var(--panel-border);
    padding-top: 12px;
  }
  .bucket-sub b { color: var(--text); font-weight: 600; }

  /* --- Stats row --- */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 16px;
  }
  .stat {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .stat .num {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 600;
  }
  .stat.allowed .num { color: var(--green); }
  .stat.blocked .num { color: var(--red); }
  .stat .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* --- Log feed --- */
  #logPanel { padding: 0; overflow: hidden; }
  #logPanel h2 { padding: 20px 20px 0; margin-bottom: 12px; }
  .log {
    font-family: var(--mono);
    font-size: 12.5px;
    height: 260px;
    overflow-y: auto;
    padding: 0 20px 16px;
  }
  .log-row {
    display: flex;
    gap: 10px;
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    color: var(--muted);
  }
  .log-row .code { width: 34px; font-weight: 700; }
  .log-row.ok .code { color: var(--green); }
  .log-row.blocked .code { color: var(--red); }
  .log-row .rem { color: var(--text); width: 90px; }

  /* --- Controls --- */
  .controls {
    display: flex; gap: 10px; align-items: center; margin-top: 18px; flex-wrap: wrap;
  }
  button {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    padding: 9px 16px;
    border-radius: 7px;
    border: 1px solid var(--panel-border);
    background: #171d26;
    color: var(--text);
    cursor: pointer;
  }
  button.primary { background: var(--amber); color: #1a1204; border-color: var(--amber); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .hint { font-size: 12px; color: var(--muted); font-family: var(--mono); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>rate-limit-gateway <span>/ live monitor</span></h1>
    <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">idle</span></div>
  </header>

  <div class="grid">
    <div class="panel" id="bucketPanel">
      <h2>Token Bucket</h2>
      <svg class="bucket-svg" viewBox="0 0 100 130">
        <path d="M15 10 H85 L75 120 Q75 126 69 126 H31 Q25 126 25 120 Z"
              fill="none" stroke="#2a323e" stroke-width="3"/>
        <clipPath id="bucketClip">
          <path d="M17 12 H83 L73.5 119 Q73.5 123 68.5 123 H31.5 Q26.5 123 26.5 119 Z"/>
        </clipPath>
        <rect id="fill" x="17" y="119" width="66" height="0" fill="url(#grad)" clip-path="url(#bucketClip)"/>
        <defs>
          <linearGradient id="grad" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0%" stop-color="#f5a623"/>
            <stop offset="100%" stop-color="#ffd27a"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="bucket-readout" id="tokenCount">–</div>
      <div class="bucket-label">tokens remaining</div>
      <div class="bucket-sub">
        <span>capacity <b id="capVal">–</b></span>
        <span>refill <b id="refillVal">–</b>/s</span>
      </div>
    </div>

    <div class="panel" style="display:flex; flex-direction:column;">
      <h2>Traffic</h2>
      <div class="stats-row">
        <div class="stat"><div class="num" id="totalCount">0</div><div class="lbl">total requests</div></div>
        <div class="stat allowed"><div class="num" id="allowedCount">0</div><div class="lbl">allowed (200)</div></div>
        <div class="stat blocked"><div class="num" id="blockedCount">0</div><div class="lbl">blocked (429)</div></div>
      </div>
      <div class="controls">
        <button class="primary" id="startBtn">Start traffic</button>
        <button id="stopBtn" disabled>Stop</button>
        <button id="burstBtn">Send burst of 15</button>
        <span class="hint" id="rateHint">1 request / 300ms</span>
      </div>
    </div>
  </div>

  <div class="panel" id="logPanel">
    <h2>Request Log</h2>
    <div class="log" id="log"></div>
  </div>

</div>

<script>
const GATEWAY_PATH = "/api/hello"; // same-origin, served by the gateway itself
let totalCount = 0, allowedCount = 0, blockedCount = 0;
let capacity = null, refillRate = null;
let timer = null;

const el = id => document.getElementById(id);

function setStatus(live) {
  el("statusDot").className = "dot" + (live ? " live" : "");
  el("statusText").textContent = live ? "receiving traffic" : "idle";
}

function updateBucketVisual(remaining) {
  if (capacity == null) return;
  const pct = Math.max(0, Math.min(1, remaining / capacity));
  const maxHeight = 107; // px in the SVG's internal coordinate space
  const fillH = pct * maxHeight;
  const rect = document.getElementById("fill");
  rect.setAttribute("height", fillH.toFixed(1));
  rect.setAttribute("y", (119 - fillH).toFixed(1));
  el("tokenCount").textContent = remaining;
}

function logRow(code, remaining) {
  const row = document.createElement("div");
  const ok = code === 200;
  row.className = "log-row " + (ok ? "ok" : "blocked");
  const time = new Date().toLocaleTimeString();
  row.innerHTML = `<span class="code">${code}</span><span>${time}</span><span class="rem">${ok ? "remaining " + remaining : "rejected"}</span>`;
  const logEl = el("log");
  logEl.prepend(row);
  while (logEl.children.length > 60) logEl.removeChild(logEl.lastChild);
}

async function fireRequest() {
  totalCount++;
  el("totalCount").textContent = totalCount;
  try {
    const res = await fetch(GATEWAY_PATH, { cache: "no-store" });
    const remaining = parseInt(res.headers.get("X-RateLimit-Remaining") || "0", 10);

    if (res.status === 200) {
      allowedCount++;
      el("allowedCount").textContent = allowedCount;
    } else {
      blockedCount++;
      el("blockedCount").textContent = blockedCount;
    }
    updateBucketVisual(remaining);
    logRow(res.status, remaining);
  } catch (err) {
    logRow(0, 0);
  }
}

el("startBtn").addEventListener("click", () => {
  if (timer) return;
  setStatus(true);
  el("startBtn").disabled = true;
  el("stopBtn").disabled = false;
  timer = setInterval(fireRequest, 300);
});

el("stopBtn").addEventListener("click", () => {
  clearInterval(timer);
  timer = null;
  setStatus(false);
  el("startBtn").disabled = false;
  el("stopBtn").disabled = true;
});

el("burstBtn").addEventListener("click", () => {
  setStatus(true);
  for (let i = 0; i < 15; i++) setTimeout(fireRequest, i * 40);
  setTimeout(() => { if (!timer) setStatus(false); }, 15 * 40 + 300);
});

// Fetch config so capacity/refill are real, not guessed
async function loadConfig() {
  try {
    const res = await fetch("/dashboard-config");
    const data = await res.json();
    capacity = data.capacity;
    refillRate = data.refillRate;
    el("capVal").textContent = capacity;
    el("refillVal").textContent = refillRate;
    updateBucketVisual(capacity);
  } catch (e) {
    el("capVal").textContent = "?";
    el("refillVal").textContent = "?";
  }
}

loadConfig();
</script>
</body>
</html>
